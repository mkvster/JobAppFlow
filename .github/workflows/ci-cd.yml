# Standard monorepo release pattern:
# - PR: build/test only, no deploy
# - push to main:
#   - deploy backend first if backend changed
#   - backend must pass /health before frontend deploy
#   - frontend-only changes deploy frontend without backend deploy
# This prevents a new frontend from reaching production before its matching backend.
name: JobAppFlow CI/CD

on:
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/ci-cd.yml'

  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/ci-cd.yml'

permissions:
  id-token: write
  contents: read

env:
  # Backend configuration
  DOTNET_VERSION: '10.0.x'
  SOLUTION_PATH: 'backend/JobAppFlow.Server/JobAppFlow.Server.slnx'
  API_PROJECT_PATH: 'backend/JobAppFlow.Server/JobAppFlow.Api/JobAppFlow.Api.csproj'
  PUBLISH_DIR: '${{ github.workspace }}/publish/backend'
  BACKEND_DEPLOY_EXCLUDED_PATHS: '^backend/Database/|^backend/JobAppFlow\.Server/Tools/|^backend/JobAppFlow\.Server/Tests/'

  # Frontend configuration
  NODE_VERSION: '24'
  FRONTEND_APP_PATH: 'frontend/jobappflow-web'
  FRONTEND_DIST_PATH: 'frontend/jobappflow-web/dist/jobappflow-web/browser'

jobs:
  # Treat workflow changes as affecting both backend and frontend.
  # This intentionally runs the full CI/CD path on push to main so pipeline changes are validated.
  detect_changes:
    name: Detect changed areas
    runs-on: ubuntu-latest

    outputs:
      backend_changed: ${{ steps.filter.outputs.backend_changed }}
      backend_deploy_changed: ${{ steps.filter.outputs.backend_deploy_changed }}
      frontend_changed: ${{ steps.filter.outputs.frontend_changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          else
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
          fi

          # Fallback when base_sha is empty or all zeros
          if [ -z "$base_sha" ] || [[ "$base_sha" =~ ^0+$ ]]; then
            if git rev-parse "${head_sha}^" >/dev/null 2>&1; then
              base_sha="$(git rev-parse "${head_sha}^")"
            else
              base_sha="$head_sha"
            fi
          fi

          changed_files="$(git diff --name-only "$base_sha" "$head_sha")"

          backend_changed=false
          backend_deploy_changed=false
          frontend_changed=false
          workflow_changed=false

          if echo "$changed_files" | grep -q '^backend/'; then
            backend_changed=true
          fi

          if echo "$changed_files" | grep -Evq "$BACKEND_DEPLOY_EXCLUDED_PATHS" && echo "$changed_files" | grep -q '^backend/'; then
            backend_deploy_changed=true
          fi

          if echo "$changed_files" | grep -q '^frontend/'; then
            frontend_changed=true
          fi

          if echo "$changed_files" | grep -q '^\.github/workflows/ci-cd.yml$'; then
            workflow_changed=true
          fi

          # Re-run the full pipeline when the workflow changes
          if [ "$workflow_changed" = "true" ]; then
            backend_changed=true
            backend_deploy_changed=true
            frontend_changed=true
          fi

          echo "backend_changed=$backend_changed" >> "$GITHUB_OUTPUT"
          echo "backend_deploy_changed=$backend_deploy_changed" >> "$GITHUB_OUTPUT"
          echo "frontend_changed=$frontend_changed" >> "$GITHUB_OUTPUT"

  build-test:
    name: Build and test backend
    runs-on: ubuntu-latest
    needs: detect_changes
    if: needs.detect_changes.outputs.backend_changed == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION_PATH }} --configuration Release --no-restore

      - name: Test
        run: dotnet test ${{ env.SOLUTION_PATH }} --configuration Release --no-build

      - name: Publish API
        if: github.event_name == 'push'
        run: dotnet publish ${{ env.API_PROJECT_PATH }} --configuration Release --no-build --output ${{ env.PUBLISH_DIR }}

      - name: Upload backend artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: backend-publish
          path: ${{ env.PUBLISH_DIR }}

  deploy:
    name: Deploy backend to Azure App Service
    runs-on: ubuntu-latest
    needs:
      - detect_changes
      - build-test
    if: github.event_name == 'push' && needs.detect_changes.outputs.backend_deploy_changed == 'true'

    environment:
      name: production
      url: ${{ vars.AZURE_WEBAPP_URL }}

    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-publish
          path: ./publish/backend

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          package: ./publish/backend

      - name: Smoke test health endpoint
        shell: bash
        run: |
          url="${{ vars.AZURE_WEBAPP_URL }}"
          url="${url%/}/health"

          for attempt in $(seq 1 12); do
            if [ "$(curl --fail --show-error --silent "$url" || true)" = "Healthy" ]; then
              echo "Health check passed: $url"
              exit 0
            fi

            echo "Health check failed on attempt $attempt/12. Retrying in 10 seconds..."
            sleep 10
          done

          echo "Health check did not pass after deployment: $url"
          exit 1

  # Gate for frontend deployment.
  # If backend code changed in this release, backend deploy must have succeeded.
  # If only backend non-runtime files changed, the gate passes immediately.
  # This avoids blocking frontend-only releases while protecting combined backend+frontend releases.
  backend_gate:
    name: Backend deployment gate
    runs-on: ubuntu-latest
    needs:
      - detect_changes
      - deploy
    if: ${{ always() && !cancelled() && github.event_name == 'push' }}
    outputs:
      ready: ${{ steps.gate.outputs.ready }}

    steps:
      - id: gate
        shell: bash
        run: |
          set -euo pipefail

          backend_deploy_changed="${{ needs.detect_changes.outputs.backend_deploy_changed }}"
          deploy_result="${{ needs.deploy.result }}"

          if [ "$backend_deploy_changed" != "true" ]; then
            echo "Backend did not change in a deploy-worthy way. Gate passed."
            echo "ready=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$deploy_result" = "success" ]; then
            echo "Backend changed in a deploy-worthy way and deployed successfully. Gate passed."
            echo "ready=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Backend changed in a deploy-worthy way but deployment did not succeed. Gate failed."
          echo "Backend deploy result: $deploy_result"
          exit 1

  frontend-build:
    name: Build frontend
    runs-on: ubuntu-latest
    needs: detect_changes
    if: needs.detect_changes.outputs.frontend_changed == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '${{ env.FRONTEND_APP_PATH }}/package-lock.json'

      - name: Set frontend backend URL
        shell: bash
        working-directory: ${{ env.FRONTEND_APP_PATH }}
        run: |
          printf '%s\n' \
            'export const environment = {' \
            '  production: true,' \
            '  backendBaseUrl: "${{ vars.AZURE_WEBAPP_URL }}"' \
            '};' \
            > src/environments/environment.ts

      - name: Install frontend dependencies
        working-directory: ${{ env.FRONTEND_APP_PATH }}
        run: npm ci

      - name: Run frontend lint
        working-directory: ${{ env.FRONTEND_APP_PATH }}
        run: npm run lint --if-present

      - name: Build frontend
        working-directory: ${{ env.FRONTEND_APP_PATH }}
        run: npm run build -- --configuration production

      - name: Upload frontend artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: ${{ env.FRONTEND_DIST_PATH }}

  # Frontend deploy always waits for backend_gate.
  # For frontend-only changes, backend_gate passes immediately.
  # For backend+frontend changes, backend_gate waits for successful backend deploy + health check.
  deploy_frontend:
    name: Deploy frontend to Azure Static Web Apps
    runs-on: ubuntu-latest
    needs:
      - detect_changes
      - frontend-build
      - backend_gate
    if: ${{ github.event_name == 'push' && needs.detect_changes.outputs.frontend_changed == 'true' && needs.backend_gate.outputs.ready == 'true' }}
    outputs:
      static_web_app_url: ${{ steps.deploy.outputs.static_web_app_url }}

    environment:
      name: production

    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./frontend-dist

      - name: Deploy to Azure Static Web Apps
        id: deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: ./frontend-dist
          api_location: ''
          output_location: ''
          skip_app_build: true

  # Final smoke check after frontend deploy.
  final_verification:
    name: Verify released app
    runs-on: ubuntu-latest
    needs:
      - detect_changes
      - deploy_frontend
    if: success() && github.event_name == 'push' && needs.detect_changes.outputs.frontend_changed == 'true'

    steps:
      - name: Verify frontend site is reachable
        shell: bash
        run: |
          url="${{ needs.deploy_frontend.outputs.static_web_app_url }}"

          for attempt in $(seq 1 12); do
            if curl --fail --show-error --silent "${url%/}/" >/dev/null; then
              echo "Frontend is reachable."
              exit 0
            fi

            echo "Frontend not ready yet. Attempt $attempt/12. Retrying in 10 seconds..."
            sleep 10
          done

          echo "Frontend did not become reachable in time."
          exit 1

      - name: Verify backend health from release flow
        shell: bash
        run: |
          url="${{ vars.AZURE_WEBAPP_URL }}"
          url="${url%/}/health"

          for attempt in $(seq 1 12); do
            if [ "$(curl --fail --show-error --silent "$url" || true)" = "Healthy" ]; then
              echo "Backend health check passed: $url"
              exit 0
            fi

            echo "Backend health check failed on attempt $attempt/12. Retrying in 10 seconds..."
            sleep 10
          done

          echo "Backend health check did not pass after frontend deployment: $url"
          exit 1

      - name: Frontend release completed
        run: |
          echo "Frontend deployment completed successfully."
