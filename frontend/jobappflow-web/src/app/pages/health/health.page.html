<main class="health-page">
  <mat-card class="health-card">
    <div class="health-header">
      <p class="app-eyebrow">JobAppFlow</p>
      <h1>Server health check</h1>
    </div>

    <mat-card-content>
      <div
        class="health-pill"
        [class.is-healthy]="status() === 'healthy'"
        [class.is-unhealthy]="status() === 'unhealthy'"
        [class.is-loading]="status() === 'loading'"
      >
        <span class="health-pill__dot" aria-hidden="true"></span>
        @if (status() === 'loading') {
          <span>Checking server...</span>
        } @else if (status() === 'healthy') {
          <span>Server is online</span>
        } @else {
          <span>Server is unavailable</span>
        }
      </div>

      <p class="health-copy">{{ details() }}</p>
      @if (lastChecked()) {
        <p class="health-meta">Last checked: {{ lastChecked() }}</p>
      }
    </mat-card-content>

    <mat-card-actions align="end">
      <button mat-stroked-button type="button" (click)="refreshHealth()">Recheck</button>
    </mat-card-actions>
  </mat-card>
</main>
